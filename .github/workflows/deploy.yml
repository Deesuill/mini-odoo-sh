name: Mini Odoo SH Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Test Workflow
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST}}
          username: ${{ secrets.SERVER_USER}}
          key: ${{ secrets.SERVER_SSH_KEY}}
          script: |
            cd /opt/mini-odoo-sh
            ./scripts/deploy.sh
